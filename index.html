<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    // PASTE YOUR ACTUAL FIREBASE CONFIG HERE
   const firebaseConfig = {
  apiKey: "AIzaSyDWFWY5euuAyOz0UKRcbAccMpCu98cGoEM",
  authDomain: "chess-theboys1.firebaseapp.com",
  projectId: "chess-theboys1",
  storageBucket: "chess-theboys1.firebasestorage.app",
  messagingSenderId: "317448863706",
  appId: "1:317448863706:web:839ac8ac53a4572b284ae3",
  measurementId: "G-WJ6RDC4ZF2"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let board = null;
    let game = new Chess();
    let roomCode = '';
    let sourceSquare = null; // Tracks the first tap

    window.connectToRoom = function() {
        roomCode = document.getElementById('roomInput').value;
        if(!roomCode) return alert("MISSION CODE REQUIRED.");
        const roomRef = ref(db, 'rooms/' + roomCode);
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.fen !== game.fen()) {
                game.load(data.fen);
                board.position(data.fen);
            }
        });
        initBoard();
    }

    // Handles the Tap-to-Move logic
    function onSquareClick(square) {
        // If we haven't picked a piece yet
        if (sourceSquare === null) {
            const piece = game.get(square);
            if (piece) {
                sourceSquare = square;
                // Highlight the selected square (Vought Red)
                document.querySelector(`.square-${square}`).style.boxShadow = 'inset 0 0 10px 5px #b30000';
            }
        } 
        // If we already picked a piece, this second tap is the destination
        else {
            let move = game.move({
                from: sourceSquare,
                to: square,
                promotion: 'q' 
            });

            // Clear highlight
            document.querySelector(`.square-${sourceSquare}`).style.boxShadow = 'none';

            if (move !== null) {
                board.position(game.fen());
                set(ref(db, 'rooms/' + roomCode), { fen: game.fen() });
            }
            
            sourceSquare = null; // Reset for next move
        }
    }

    function initBoard() {
        board = Chessboard('board', {
            draggable: false, // Disable dragging to force tap-to-move
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        // Add click listeners to all squares
        $('#board').on('click', '.square-55d63', function() {
            const square = $(this).attr('data-square');
            onSquareClick(square);
        });
    }
</script>
