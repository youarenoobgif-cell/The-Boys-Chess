<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE BOYS CHESS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        :root { --vought-red: #b30000; --dark-bg: #050505; --panel-bg: #111; }
        body { background: var(--dark-bg); color: white; font-family: 'Impact', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; padding-bottom: 40px; }
        #header { color: var(--vought-red); text-transform: uppercase; margin: 20px 0; letter-spacing: 5px; font-size: 3.5rem; text-shadow: 3px 3px 0px white; }
        .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 10px; }
        #board { width: 480px; max-width: 90vw; border: 5px solid #fff; }
        .panel { background: var(--panel-bg); padding: 20px; border: 1px solid #333; width: 320px; box-shadow: 8px 8px 0px var(--vought-red); }
        .controls label { display: block; font-size: 0.75rem; color: #aaa; margin-top: 10px; text-transform: uppercase; }
        .controls input, .controls select { background: #000; border: 1px solid #444; color: white; padding: 10px; margin-bottom: 10px; width: 100%; box-sizing: border-box; font-family: sans-serif; outline: none; }
        .timer-box { font-size: 2.2rem; text-align: center; background: #000; border: 2px solid var(--vought-red); margin: 10px 0; padding: 10px; font-family: monospace; color: #fff; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: var(--vought-red); color: white; border: none; padding: 12px; cursor: pointer; font-family: 'Impact'; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: white; color: black; }
        button.secondary { background: #333; }
        .classic-theme .white-1e1d7 { background-color: #ebecd0; }
        .classic-theme .black-3c85d { background-color: #779556; }
        .vought-theme .white-1e1d7 { background-color: #ffffff; }
        .vought-theme .black-3c85d { background-color: #000000; }
        .highlight-selected { box-shadow: inset 0 0 5px 5px var(--vought-red) !important; }
        .status-bar { background: var(--vought-red); padding: 8px; text-align: center; font-size: 0.9rem; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 id="header">THE BOYS</h1>

    <div class="game-container">
        <div>
            <div id="player-display" class="status-bar">CONNECTING TO the boys NETWORK...</div>
            <div id="board" class="classic-theme"></div>
        </div>

        <div class="panel">
            <div class="controls">
                <label>userNAME</label>
                <input type="text" id="playerName" placeholder="BUTCHER">
                <label>room CODE</label>
                <input type="text" id="roomInput" placeholder="Room ID">
                <button onclick="connectToRoom()">JOIN room</button>
                <div class="timer-box" id="timerDisplay">00:00</div>
                <div class="btn-group">
                    <button onclick="startTimer()">START</button>
                    <button onclick="stopTimer()">STOP</button>
                    <button class="secondary" onclick="resetTimer()">RESET TIME</button>
                    <button class="secondary" onclick="resetGame()">RESET BOARD</button>
                </div>
                <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
                <label>BOARD COLOR</label>
                <select onchange="changeBoardTheme(this.value)">
                    <option value="classic-theme">Classic Forest (Green)</option>
                    <option value="vought-theme">Vought Industrial (B&W)</option>
                </select>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWFWY5euuAyOz0UKRcbAccMpCu98cGoEM",
        authDomain: "chess-theboys1.firebaseapp.com",
        projectId: "chess-theboys1",
        storageBucket: "chess-theboys1.firebasestorage.app",
        messagingSenderId: "317448863706",
        appId: "1:317448863706:web:839ac8ac53a4572b284ae3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let board, game = new Chess(), roomCode = '', sourceSquare = null;
    let timerInterval, seconds = 0;

    window.connectToRoom = function() {
        roomCode = document.getElementById('roomInput').value;
        const name = document.getElementById('playerName').value || "Unknown Supe";
        if(!roomCode) return alert("MISSION CODE REQUIRED.");
        update(ref(db, `rooms/${roomCode}/players`), { [name]: true });
        onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.fen && data.fen !== game.fen()) {
                    game.load(data.fen);
                    board.position(data.fen);
                }
                if (data.players) document.getElementById('player-display').innerText = Object.keys(data.players).join(' VS ');
            }
        });
        initBoard();
    };

    window.resetGame = () => {
        if(!roomCode || !confirm("Reset board?")) return;
        game.reset();
        board.start();
        set(ref(db, `rooms/${roomCode}/fen`), game.fen());
    };

    window.startTimer = () => {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60), s = seconds % 60;
            document.getElementById('timerDisplay').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    };

    window.stopTimer = () => clearInterval(timerInterval);
    window.resetTimer = () => { stopTimer(); seconds = 0; document.getElementById('timerDisplay').innerText = "00:00"; };
    window.changeBoardTheme = (t) => $('#board').attr('class', t);

    function onSquareClick() {
        const square = $(this).attr('data-square');
        if (sourceSquare === null) {
            const p = game.get(square);
            if (p && p.color === game.turn()) {
                sourceSquare = square;
                $('.square-55d63').removeClass('highlight-selected');
                $(this).addClass('highlight-selected');
            }
        } else {
            const p = game.get(sourceSquare);
            let prom = 'q';
            if (p && p.type === 'p' && (square[1] === '8' || square[1] === '1')) {
                prom = prompt("Promote (q,r,b,n)?", "q") || 'q';
            }
            const move = game.move({ from: sourceSquare, to: square, promotion: prom });
            if (move !== null) {
                board.position(game.fen());
                update(ref(db, `rooms/${roomCode}`), { fen: game.fen() });
            }
            $('.square-55d63').removeClass('highlight-selected');
            sourceSquare = null;
        }
    }

    function initBoard() {
        board = Chessboard('board', {
            draggable: false,
            position: game.fen() || 'start',
            // FIXED PIECE THEME URL
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });
        $('#board').off('click').on('click', '.square-55d63', onSquareClick);
    }
</script>
</body>
</html>
